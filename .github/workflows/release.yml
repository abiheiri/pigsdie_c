name: Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            cc: cc
          - os: ubuntu-latest
            target: aarch64-linux
            cc: aarch64-linux-gnu-gcc
            cross: true
          - os: macos-latest
            target: x86_64-macos
            cc: "clang -arch x86_64"
          - os: macos-latest
            target: aarch64-macos
            cc: cc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross-compiler (Linux aarch64)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: make CC="${{ matrix.cc }}"

      - name: Package binary
        run: |
          mkdir -p dist
          cp pigsdie dist/pigsdie
          tar -czf dist/pigsdie-${{ matrix.target }}.tar.gz -C dist pigsdie
          rm dist/pigsdie

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pigsdie-${{ matrix.target }}
          path: dist/pigsdie-${{ matrix.target }}.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
